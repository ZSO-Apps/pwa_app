# Beispiel für eine WK-Datei.
# Echte WK-Dateien liegen ebenfalls unter data/wk/*.yaml und werden nicht committed.
id: wk-2026-001
nummer: "001"
name: "WK Beispiel"
zeitraum:
  von: "2026-09-07"
  bis: "2026-09-11"
ort: "TBD"

# Referenzen für spätere Formulare: Formulare können wkId verwenden, z.B. wk-2026-001.
formularReferenz: wk-2026-001

# "Eingetragen" bedeutet: Der Benutzer oder Gruppenaccount steht in kader oder mannschaft.
kader:
  - username: Of
    name: "Offizier Beispiel"
    rolle: Offizier
    funktion: "WK Leitung"
  - username: Uof
    name: "Unteroffizier Beispiel"
    rolle: Unteroffizier
    funktion: "Gruppenführer"

mannschaft:
  - username: AdZS
    name: "Soldat Beispiel"
    rolle: Soldat
    funktion: "Mannschaft"
    gruppe: "Gruppe 1"

# Appell wird möglich, sobald Kader und Mannschaft eingetragen sind.
appell:
  status: offen
  durchgefuehrtAm: null
  durchgefuehrtVon: null
  eintraege:
    - username: Of
      status: offen
      bemerkung: ""
    - username: Uof
      status: offen
      bemerkung: ""
    - username: AdZS
      status: offen
      bemerkung: ""
